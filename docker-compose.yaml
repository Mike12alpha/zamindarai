version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./zamindarai.db}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      HF_TOKEN: ${HF_TOKEN}
      SERPAPI_KEY: ${SERPAPI_KEY}
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./backend/data:/app/data
      - ./backend/uploads:/app/uploads
      - ./backend/contracts:/app/contracts
      - ./backend/qr_codes:/app/qr_codes
      - ./backend/chroma_db:/app/chroma_db
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - zamindarai-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    networks:
      - zamindarai-net

networks:
  zamindarai-net:
    driver: bridge
