version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:///app/db/zamindarai.db}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-flash-latest}
      GEMINI_PRO_MODEL: ${GEMINI_PRO_MODEL:-gemini-pro-latest}
      HF_TOKEN: ${HF_TOKEN}
      SERPAPI_KEY: ${SERPAPI_KEY}
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      PYTHONUNBUFFERED: "1"
    volumes:
      - backend_db:/app/db
      - backend_uploads:/app/uploads
      - backend_contracts:/app/contracts
      - backend_qrcodes:/app/qr_codes
      - backend_chroma:/app/chroma_db
    ports:
      - "18000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - zamindarai-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${SERVICE_URL_BACKEND:-http://backend:8000}
        INTERNAL_API_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: ${SERVICE_URL_BACKEND:-http://backend:8000}
    ports:
      - "13000:3000"
    networks:
      - zamindarai-net

volumes:
  backend_db:
  backend_uploads:
  backend_contracts:
  backend_qrcodes:
  backend_chroma:

networks:
  zamindarai-net:
    driver: bridge
